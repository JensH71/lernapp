name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "npm"
      - run: rm -rf node_modules package-lock.json
      - run: npm install
      - run: npm run build
        env:
          VITE_LOG_SHEET_URL: ${{ secrets.VITE_LOG_SHEET_URL }}
          VITE_LOG_SHEET_TOKEN: ${{ secrets.VITE_LOG_SHEET_TOKEN }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
